<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="src/imgs/favicon.ico" type="image/x-icon" />
    <title>Stash & Serve</title>
    <link rel="stylesheet" href="src/sass/main.scss" />
    <script type="module" defer src="./src/js/script.js"></script>
  </head>
  <body>
    <body>
      <main class="container">
        <!-- HEADER -->
        <header class="nav">
          <div class="logo-search-container">
            <img src="src/imgs/logo.jpg" alt="brand-logo" class="logo" />

            <form class="search" role="search">
              <input
                id="input"
                type="text"
                placeholder="Search over 1,000,000 recipes..."
              />
              <button class="button button-primary" id="search-btn">
                Search
              </button>
            </form>
          </div>

          <div class="recipe-actions-container">
            <button class="action-btn">Add Recipe</button>
            <button class="action-btn">Bookmarks</button>
          </div>
        </header>

        <!-- MAIN LAYOUT -->
        <section class="layout">
          <!-- LEFT SIDEBAR -->
          <aside class="sidebar">
            <!-- search results go here -->
          </aside>

          <!-- RIGHT CONTENT -->
          <div class="content">
            <p class="empty-state">
              Start by searching for a recipe or an ingredient. Have fun!
            </p>
          </div>
        </section>
      </main>
    </body>
  </body>
</html>
